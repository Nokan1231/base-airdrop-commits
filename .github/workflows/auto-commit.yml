name: Auto Commit

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make 10 commits
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          for i in $(seq 1 10); do
            echo "Auto commit $i at $(date)" >> activity.log
            git add activity.log
            git commit -m "Auto commit batch: $(date '+%Y-%m-%d %H:%M:%S') - $i"
            sleep 1
          done
          git push
